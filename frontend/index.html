<!DOCTYPE html>
<html>
<head>
  <title>App Dietas</title>
</head>
<body>

<h2>Registro</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="registrar()">Registrarse</button>

<hr>

<h2>Login</h2>

<input id="emailLogin" placeholder="Email"><br><br>
<input id="passwordLogin" type="password" placeholder="Password"><br><br>

<button onclick="login()">Iniciar sesión</button>

<hr>


<h2>Crear Dieta</h2>

<input id="usuario_id" placeholder="ID usuario"><br><br>
<input id="nombreDieta" placeholder="Nombre dieta"><br><br>
<input id="descripcion" placeholder="Descripción"><br><br>
<input id="calorias" placeholder="Calorías"><br><br>

<button onclick="crearDieta()">Crear dieta</button>

<script>
async function registrar() {
  const nombre = document.getElementById('nombre').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('http://localhost:3000/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ nombre, email, password })
  });

  const data = await res.json();
  alert(data.msg);
}

// LOGIN
async function login() {
  const email = document.getElementById('emailLogin').value;
  const password = document.getElementById('passwordLogin').value;

  const res = await fetch('http://localhost:3000/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert(data.msg);
}

async function crearDieta() {
  const usuario_id = document.getElementById('usuario_id').value;
  const nombre = document.getElementById('nombreDieta').value;
  const descripcion = document.getElementById('descripcion').value;
  const calorias = document.getElementById('calorias').value;

  const res = await fetch('http://localhost:3000/api/dietas/crear', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ usuario_id, nombre, descripcion, calorias })
  });

  const data = await res.json();
  alert(data.msg);
}
</script>

</body>
</html>
